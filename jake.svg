<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <defs>
    <style>
      text { font-family: 'Courier New', Courier, monospace; }
      .title { font-size: 36px; font-weight: bold; fill: #f3f4f6; }
      .subtitle { font-size: 16px; font-weight: bold; fill: #9ca3af; letter-spacing: 2px; }
      .tagline { font-size: 14px; fill: #6b7280; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" rx="6" fill="#0d1117" />

  <!-- === ST. JOHNS BRIDGE SILHOUETTE === -->
  
  <!-- Main Suspension Cables -->
  <path d="M 0 95 Q 60 45 120 35 Q 180 45 250 95" fill="none" stroke="#599E90" stroke-width="2.5" />

  <!-- Vertical Suspenders -->
  <g stroke="#3F7A6E" stroke-width="1">
    <line x1="15" y1="83" x2="15" y2="105" />
    <line x1="30" y1="73" x2="30" y2="105" />
    <line x1="45" y1="64" x2="45" y2="105" />
    <line x1="60" y1="56" x2="60" y2="105" />
    <line x1="75" y1="48" x2="75" y2="105" />
    <line x1="90" y1="42" x2="90" y2="105" />
    <line x1="105" y1="37" x2="105" y2="105" />
    
    <line x1="135" y1="37" x2="135" y2="105" />
    <line x1="150" y1="42" x2="150" y2="105" />
    <line x1="165" y1="48" x2="165" y2="105" />
    <line x1="180" y1="56" x2="180" y2="105" />
    <line x1="195" y1="64" x2="195" y2="105" />
    <line x1="210" y1="73" x2="210" y2="105" />
    <line x1="225" y1="83" x2="225" y2="105" />
    <line x1="240" y1="91" x2="240" y2="105" />
  </g>

  <!-- Main Tower Block -->
  <rect x="85" y="35" width="70" height="145" fill="#599E90" />
  
  <!-- Top Spires -->
  <polygon points="86,35 90,5 94,35" fill="#71BCAA" />
  <polygon points="146,35 150,5 154,35" fill="#71BCAA" />
  <polygon points="118,35 120,15 122,35" fill="#71BCAA" />

  <!-- Top Gothic Arch Cutout -->
  <path d="M 97 105 L 97 70 Q 110 70 120 45 Q 130 70 143 70 L 143 105 Z" fill="#0d1117" />

  <!-- Bottom Gothic Arch Cutout -->
  <path d="M 97 180 L 97 140 Q 110 140 120 115 Q 130 140 143 140 L 143 180 Z" fill="#0d1117" />

  <!-- Tower Cross Bracing (visible inside the cutouts) -->
  <line x1="97" y1="80" x2="143" y2="80" stroke="#599E90" stroke-width="1.5" />
  <line x1="97" y1="95" x2="143" y2="95" stroke="#599E90" stroke-width="1.5" />
  <line x1="97" y1="150" x2="143" y2="150" stroke="#599E90" stroke-width="1.5" />
  <line x1="97" y1="165" x2="143" y2="165" stroke="#599E90" stroke-width="1.5" />

  <!-- Deck Background Cutout -->
  <rect x="0" y="105" width="260" height="10" fill="#0d1117" />

  <!-- Deck Truss Structure -->
  <rect x="0" y="105" width="260" height="2" fill="#599E90" />
  <rect x="0" y="113" width="260" height="2" fill="#599E90" />
  
  <path d="M 0 105 L 10 115 L 20 105 L 30 115 L 40 105 L 50 115 L 60 105 L 70 115 L 80 105 L 90 115 L 100 105 L 110 115 L 120 105 L 130 115 L 140 105 L 150 115 L 160 105 L 170 115 L 180 105 L 190 115 L 200 105 L 210 115 L 220 105 L 230 115 L 240 105 L 250 115 L 260 105" fill="none" stroke="#599E90" stroke-width="1.5" />

  <!-- === DIVIDER === -->
  <line x1="280" y1="40" x2="280" y2="140" stroke="#374151" stroke-width="2" />

  <!-- === RIGHT SIDE TEXT === -->
  <text x="310" y="80" class="title">JAKE HOOVER</text>
  <text x="310" y="115" class="subtitle">PORTLAND, OR · INDIE OPERATOR</text>
  <text x="310" y="140" class="tagline">Building systems for the real world. No investors, no pretense.</text>
</svg>
