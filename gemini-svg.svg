<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <defs>
    <style>
      text { font-family: 'Courier New', Courier, monospace; }
      .title { font-size: 36px; font-weight: bold; fill: #f3f4f6; }
      .subtitle { font-size: 16px; font-weight: bold; fill: #9ca3af; letter-spacing: 2px; }
      .tagline { font-size: 14px; fill: #6b7280; }
      .gun-text { font-size: 10px; fill: #9ca3af; letter-spacing: 1px; font-weight: bold; }
    </style>
    
    <!-- Grip checkering pattern -->
    <pattern id="checkering" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M 0 0 L 0 4 M 0 0 L 4 0" stroke="#111827" stroke-width="0.75" fill="none"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" rx="6" fill="#0d1117" />

  <!-- === 1911 SILHOUETTE === -->
  
  <!-- Barrel Extension -->
  <rect x="195" y="46" width="8" height="12" fill="#374151" rx="2" />
  
  <!-- Slide -->
  <path d="M 60 40 L 195 40 C 195 40, 195 43, 195 45 L 195 66 L 60 66 Z" fill="#4b5563" />
  
  <!-- Rear Serrations -->
  <path d="M 68 44 L 68 62 M 72 44 L 72 62 M 76 44 L 76 62 M 80 44 L 80 62" stroke="#374151" stroke-width="2" />
  
  <!-- Ejection Port -->
  <rect x="145" y="40" width="18" height="6" fill="#1f2937" rx="1" />
  
  <!-- .45 ACP Text -->
  <text x="100" y="56" class="gun-text">.45 ACP</text>

  <!-- Hammer -->
  <path d="M 50 42 L 60 48 L 60 55 L 52 50 Z" fill="#374151" />
  <circle cx="53" cy="46" r="2" fill="#0d1117"/>

  <!-- Main Frame (Dust cover & Grip Base) -->
  <polygon points="50,66 195,66 195,80 120,80 110,105 90,145 50,145 60,90" fill="#374151" />
  
  <!-- Beavertail -->
  <path d="M 50 66 C 40 66, 40 70, 45 72 L 60 72 Z" fill="#4b5563" />

  <!-- Trigger Guard Loop (Hollow) -->
  <path d="M 120 80 C 145 80, 140 105, 110 105" fill="none" stroke="#374151" stroke-width="5" />
  
  <!-- Trigger -->
  <rect x="110" y="80" width="8" height="15" fill="#1f2937" rx="1" />

  <!-- Grip Panel -->
  <polygon points="65,72 110,72 105,100 85,140 55,140 62,90" fill="#1f2937" />
  <!-- Grip Checkering Layer -->
  <polygon points="65,72 110,72 105,100 85,140 55,140 62,90" fill="url(#checkering)" />

  <!-- Thumb Safety -->
  <path d="M 60 70 L 75 70 C 78 70, 78 66, 75 66 L 65 66 Z" fill="#4b5563" />
  
  <!-- Slide Stop Lever & Pin -->
  <path d="M 115 74 L 95 74 L 95 70 L 105 70 Z" fill="#4b5563" />
  <circle cx="115" cy="74" r="3.5" fill="#4b5563" />

  <!-- Magazine Base Plate -->
  <rect x="48" y="145" width="44" height="8" fill="#4b5563" rx="2" />
  <rect x="48" y="145" width="44" height="2" fill="#1f2937" />

  <!-- === DIVIDER === -->
  <line x1="250" y1="40" x2="250" y2="140" stroke="#374151" stroke-width="2" />

  <!-- === RIGHT SIDE TEXT === -->
  <text x="280" y="80" class="title">JAKE HOOVER</text>
  <text x="280" y="115" class="subtitle">PORTLAND, OR · INDIE OPERATOR</text>
  <text x="280" y="140" class="tagline">Building systems for the real world. No investors, no pretense.</text>
</svg>
